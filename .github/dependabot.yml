# Automated dependency updates (npm root + GitHub Actions).
# Weekly cadence, minor+patch grouped to keep PR noise low; majors stay separate
# so breaking bumps get individual review.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
